<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RELO — 이사 후보지 & 재무 시뮬레이터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#0d0f14;--surface:#161922;--surface2:#1e2330;--surface3:#252b3a;
  --border:#252a36;--border2:#303748;
  --text:#e8eaf0;--muted:#7a8098;--muted2:#5a607a;
  --a:#f0c040;--b:#5bc4f0;--c:#e05c7a;--green:#4ade80;
  --orange:#f97316;--red:#ef4444;--purple:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;font-size:14px;overflow:hidden}

/* ── HEADER ── */
#header{
height:60px;background:var(–surface);border-bottom:1px solid var(–border);
display:flex;align-items:center;padding:0 20px;gap:12px;
position:fixed;top:0;left:0;right:0;z-index:1000;
}
#header h1{font-family:‘Bebas Neue’,sans-serif;font-size:26px;color:var(–a);
letter-spacing:3px;flex:1;white-space:nowrap}
#header h1 span{color:var(–b);font-size:14px;margin-left:10px;
font-family:‘Noto Sans KR’,sans-serif;font-weight:300;letter-spacing:0}
.tab-btn{background:none;border:1px solid var(–border2);color:var(–muted);
padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;
font-family:‘Noto Sans KR’,sans-serif;transition:all .2s;white-space:nowrap}
.tab-btn.active{background:var(–a);color:#000;border-color:var(–a);font-weight:700}

/* ── LAYOUT ── */
#app{position:fixed;top:60px;left:0;right:0;bottom:0;display:flex}
#sidebar{width:340px;background:var(–surface);border-right:1px solid var(–border);
display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#main{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* ── SIDEBAR ── */
.sb-section{border-bottom:1px solid var(–border);padding:12px 14px}
.sb-section h3{font-family:‘Bebas Neue’,sans-serif;font-size:15px;letter-spacing:1px;
color:var(–muted);margin-bottom:10px}
.radius-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.radius-row label{font-size:11px;min-width:118px;display:flex;align-items:center;gap:5px;color:var(–muted)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.radius-row input[type=range]{flex:1;accent-color:var(–a);height:16px}
.radius-val{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–a);min-width:34px;text-align:right}
.intersect-box{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.25);
border-radius:8px;padding:8px 10px;margin-top:6px}
.intersect-box .area-num{font-family:‘DM Mono’,monospace;font-size:18px;color:var(–green)}
.intersect-box .area-sub{font-size:10px;color:var(–muted);margin-top:1px}
.nbhd-wrap{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.nbhd-tag{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);
border-radius:3px;padding:1px 6px;font-size:10px;color:var(–green)}
.ftabs{display:flex;gap:3px;margin-bottom:8px}
.ftab{flex:1;padding:5px;background:var(–surface2);border:1px solid var(–border2);
color:var(–muted);border-radius:5px;cursor:pointer;font-size:11px;text-align:center;
font-family:‘Noto Sans KR’,sans-serif;transition:all .15s}
.ftab.active{background:var(–a);color:#000;border-color:var(–a);font-weight:700}
#apt-list{flex:1;overflow-y:auto;padding:4px 0}
#apt-list::-webkit-scrollbar{width:3px}
#apt-list::-webkit-scrollbar-thumb{background:var(–border2);border-radius:2px}
.apt-item{padding:14px 16px;border-bottom:1px solid var(–border);cursor:pointer;transition:background .15s;min-height:64px}
.apt-item:hover{background:var(–surface2)}
.apt-name{font-weight:500;font-size:14px;margin-bottom:3px}
.apt-dong{font-size:12px;color:var(–muted);margin-bottom:4px}
.apt-pr{display:flex;justify-content:space-between;align-items:baseline}
.apt-price{font-family:‘DM Mono’,monospace;font-size:15px;color:var(–a)}
.apt-price.rent{color:var(–green)}
.apt-date{font-size:11px;color:var(–muted2)}
.load-msg{text-align:center;padding:24px 14px;color:var(–muted);font-size:12px}
.spinner{width:22px;height:22px;border:2px solid var(–border2);border-top-color:var(–a);
border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{text-align:center;padding:16px 14px;color:var(–c);font-size:11px;line-height:1.6}

/* ── MAP ── */
#map{flex:1;width:100%}

/* ── FINANCE PANEL ── */
#finance-panel{
position:absolute;inset:0;overflow-y:auto;
padding:20px 20px 80px;display:none;
background:var(–bg);
}
#finance-panel::-webkit-scrollbar{width:5px}
#finance-panel::-webkit-scrollbar-thumb{background:var(–border2);border-radius:3px}
.fgrid{max-width:1120px;margin:0 auto}

/* ── FIN CARDS ── */
.fin-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.fin-card{background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:16px}
.fin-card .fh{font-family:‘Bebas Neue’,sans-serif;font-size:17px;letter-spacing:1px;
color:var(–muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(–border);
display:flex;align-items:center;gap:6px}
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;
font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:8px}
.chip-a{background:rgba(240,192,64,.12);color:var(–a);border:1px solid rgba(240,192,64,.3)}
.chip-b{background:rgba(91,196,240,.12);color:var(–b);border:1px solid rgba(91,196,240,.3)}
.chip-c{background:rgba(224,92,122,.12);color:var(–c);border:1px solid rgba(224,92,122,.3)}
.chip-g{background:rgba(74,222,128,.12);color:var(–green);border:1px solid rgba(74,222,128,.3)}
.ir{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ir label{font-size:11px;color:var(–muted);flex:1;line-height:1.4}
.val-in{background:var(–surface2);border:1px solid var(–border2);color:var(–text);
border-radius:5px;padding:3px 7px;font-family:‘DM Mono’,monospace;font-size:12px;
width:130px;text-align:right;transition:border-color .15s}
.val-in:focus{outline:none;border-color:var(–a)}
.calc-v{font-family:‘DM Mono’,monospace;font-size:12px;color:var(–a);text-align:right;min-width:130px}
hr.div{border:none;border-top:1px solid var(–border);margin:8px 0}
.tot-row{display:flex;justify-content:space-between;align-items:baseline;padding-top:6px}
.tot-row .tl{font-size:12px;color:var(–text);font-weight:500}
.tot-row .tv{font-family:‘DM Mono’,monospace;font-size:14px;font-weight:700;color:var(–a)}
.tv.red{color:var(–red)}.tv.green{color:var(–green)}.tv.sky{color:var(–b)}

/* 슬라이더 행 */
.sl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sl-row label{font-size:11px;color:var(–muted);min-width:72px}
.sl-row input[type=range]{flex:1;height:16px}
.sl-val{font-family:‘DM Mono’,monospace;font-size:12px;min-width:88px;text-align:right;font-weight:500}

/* 크립토 */
.crypto-status{font-size:10px;color:var(–muted2);margin-bottom:7px}
.crypto-row{display:flex;justify-content:space-between;align-items:center;
background:var(–surface2);border:1px solid var(–border2);border-radius:6px;
padding:7px 10px;margin-bottom:5px}
.cr-name{font-weight:600;font-size:12px}
.cr-detail{display:flex;align-items:center;gap:7px}
.cr-qty{background:var(–surface);border:1px solid var(–border);color:var(–text);
border-radius:4px;padding:2px 5px;font-family:‘DM Mono’,monospace;font-size:11px;
width:72px;text-align:right}
.cr-unit{font-family:‘DM Mono’,monospace;font-size:10px;color:var(–muted)}
.cr-total{font-family:‘DM Mono’,monospace;font-size:12px;font-weight:500;color:var(–a)}

/* 양도세 */
.tax-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.tax-box{background:var(–surface2);border:1px solid var(–border2);border-radius:7px;padding:10px}
.tax-box h5{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(–muted);
margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(–border)}
.tax-save{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);
border-radius:7px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.tax-save .ts-label{font-size:11px;color:var(–muted)}
.tax-save .ts-val{font-family:‘DM Mono’,monospace;font-size:16px;color:var(–green);font-weight:700}

/* 양도세 상세 토글 */
.toggle-btn{width:100%;background:none;border:1px solid var(–border2);color:var(–muted);
border-radius:5px;padding:6px;cursor:pointer;font-size:11px;font-family:‘Noto Sans KR’,sans-serif;
margin-top:8px;transition:all .15s}
.toggle-btn:hover{border-color:var(–a);color:var(–a)}
.tax-detail{display:none;margin-top:8px;background:var(–surface2);border:1px solid var(–border2);
border-radius:7px;padding:10px}
.tax-detail.open{display:block}
.td-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.td-row .td-l{color:var(–muted)}
.td-row .td-v{font-family:‘DM Mono’,monospace;color:var(–text)}

/* 결과 요약 */
.result-card{background:var(–surface);border:1px solid var(–border);
border-radius:12px;padding:18px;margin-bottom:14px}
.result-card .rch{font-family:‘Bebas Neue’,sans-serif;font-size:20px;letter-spacing:2px;
color:var(–a);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(–border)}

/* 매도 정산 블록 */
.settle-block{background:var(–surface2);border:1px solid var(–border2);
border-radius:9px;padding:14px;margin-bottom:12px}
.settle-block h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(–muted);
margin-bottom:10px}
.settle-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.settle-row .sr-l{font-size:12px;color:var(–muted)}
.settle-row .sr-v{font-family:‘DM Mono’,monospace;font-size:13px}
.settle-row .sr-v.deduct{color:var(–red)}
.settle-row .sr-v.base{color:var(–text)}
.settle-divider{border:none;border-top:1px dashed var(–border2);margin:8px 0}
.settle-total{display:flex;justify-content:space-between;align-items:baseline;
padding-top:6px}
.settle-total .st-l{font-size:13px;font-weight:700}
.settle-total .st-v{font-family:‘DM Mono’,monospace;font-size:18px;font-weight:700;color:var(–green)}

/* 총 가용 자금 */
.avail-block{background:var(–surface2);border:1px solid var(–border2);
border-radius:9px;padding:14px;margin-bottom:12px}
.avail-block h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(–muted);margin-bottom:10px}
.avail-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.avail-row .ar-l{font-size:12px;color:var(–muted)}
.avail-row .ar-v{font-family:‘DM Mono’,monospace;font-size:13px}
.avail-divider{border:none;border-top:1px dashed var(–border2);margin:8px 0}
.avail-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:6px}
.avail-total .at-l{font-size:13px;font-weight:700}
.avail-total .at-v{font-family:‘DM Mono’,monospace;font-size:18px;font-weight:700;color:var(–a)}

/* 시나리오 비교 */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sc-box{border-radius:9px;padding:14px}
.sc-box.jeonse{background:rgba(91,196,240,.07);border:1px solid rgba(91,196,240,.25)}
.sc-box.maemae{background:rgba(240,192,64,.07);border:1px solid rgba(240,192,64,.25)}
.sc-box h4{font-size:13px;font-weight:700;margin-bottom:10px}
.sc-box h4.sky{color:var(–b)}.sc-box h4.gold{color:var(–a)}
.sc-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.sc-row .scl{color:var(–muted)}
.sc-row .scv{font-family:‘DM Mono’,monospace}
.sc-sep{border:none;border-top:1px solid var(–border);margin:8px 0}
.sc-result{display:flex;justify-content:space-between;align-items:baseline}
.sc-result .scrl{font-size:12px;font-weight:700}
.sc-result .scrv{font-family:‘DM Mono’,monospace;font-size:16px;font-weight:700}

/* 복사 버튼 */
.copy-btn{
display:flex;align-items:center;gap:6px;margin-top:12px;
background:var(–surface2);border:1px solid var(–border2);color:var(–muted);
border-radius:7px;padding:8px 14px;cursor:pointer;font-size:12px;
font-family:‘Noto Sans KR’,sans-serif;transition:all .2s;
}
.copy-btn:hover{border-color:var(–a);color:var(–a)}
.copy-btn.copied{border-color:var(–green);color:var(–green)}

/* 면책 문구 */
.disclaimer{
position:fixed;bottom:0;left:0;right:0;z-index:800;
background:rgba(13,15,20,.92);border-top:1px solid var(–border);
padding:6px 20px;text-align:center;font-size:10px;color:var(–muted2);
backdrop-filter:blur(8px);display:none;
}

/* ── MOBILE ── */
@media(max-width:768px){
body,html{overflow:hidden}
#header{padding:0 12px;gap:8px}
#header h1{font-size:20px}
#header h1 span{display:none}
.tab-btn{display:none}
#app{flex-direction:column;bottom:56px}
#sidebar{width:100%;height:100%;display:none}
#main{height:100%;width:100%}
#finance-panel{padding:12px 12px 80px}
.fin-row{grid-template-columns:1fr}
.tax-grid{grid-template-columns:1fr}
.sc-grid{grid-template-columns:1fr}
#mobile-tabbar{
display:flex;position:fixed;bottom:0;left:0;right:0;height:56px;
background:var(–surface);border-top:1px solid var(–border);z-index:1000;
}
.m-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:2px;background:none;border:none;color:var(–muted);cursor:pointer;
font-family:‘Noto Sans KR’,sans-serif;font-size:10px}
.m-tab .mi{font-size:20px}
.m-tab.active{color:var(–a)}
#bottomsheet{
position:fixed;bottom:56px;left:0;right:0;
background:var(–surface);border-top:1px solid var(–border2);
border-radius:14px 14px 0 0;z-index:900;
transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#bottomsheet.collapsed{transform:translateY(calc(100% - 76px))}
.bs-handle{display:flex;justify-content:center;padding:9px;cursor:pointer}
.bs-handle::after{content:’’;width:32px;height:4px;background:var(–border2);border-radius:2px;display:block}
.bs-content{padding:0 12px 12px;overflow-y:auto;max-height:58vh}
.disclaimer{bottom:56px}
}
@media(min-width:769px){
#mobile-tabbar{display:none}
#bottomsheet{display:none}
}

/* 팝업 스타일 */
.lp-wrap .leaflet-popup-content-wrapper{
background:#161922!important;border:1px solid #252a36!important;
border-radius:10px!important;box-shadow:0 8px 32px rgba(0,0,0,.7)!important;color:#e8eaf0!important;
}
.lp-wrap .leaflet-popup-tip{background:#252a36!important;}
.lp-wrap .leaflet-popup-content{margin:10px 12px!important;}
</style>

</head>
<body>

<div id="header">
  <h1>RELO<span>이사 후보지 &amp; 재무 시뮬레이터</span></h1>
  <button class="tab-btn active" id="btn-map" onclick="switchTab('map')">🗺️ 지도</button>
  <button class="tab-btn" id="btn-finance" onclick="switchTab('finance')">💰 재무</button>
</div>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-section">
      <h3>📍 거점 반경 설정</h3>
      <div class="radius-row">
        <label><span class="dot" style="background:var(--a)"></span>압구정 영유 (A)</label>
        <input type="range" id="rA" min="1" max="15" step="0.5" value="4" oninput="updateRadius('A',this.value)">
        <span class="radius-val" id="rvA">4.0km</span>
      </div>
      <div class="radius-row">
        <label><span class="dot" style="background:var(--b)"></span>처가 원베일리 (B)</label>
        <input type="range" id="rB" min="1" max="15" step="0.5" value="5" oninput="updateRadius('B',this.value)">
        <span class="radius-val" id="rvB">5.0km</span>
      </div>
      <div class="radius-row">
        <label><span class="dot" style="background:var(--c)"></span>왕십리역 한계 (C)</label>
        <input type="range" id="rC" min="1" max="15" step="0.5" value="6" oninput="updateRadius('C',this.value)">
        <span class="radius-val" id="rvC">6.0km</span>
      </div>
      <div class="intersect-box">
        <div class="area-num" id="intersect-area">계산 중...</div>
        <div class="area-sub">세 거점 교집합 면적</div>
        <div class="nbhd-wrap" id="nbhd-tags"></div>
      </div>
    </div>
    <div class="sb-section">
      <h3>🏠 실거래가</h3>
      <div class="ftabs">
        <button class="ftab active" id="tt-buy" onclick="setTT('buy')">매매</button>
        <button class="ftab" id="tt-rent" onclick="setTT('rent')">전세</button>
      </div>
      <div class="ftabs">
        <button class="ftab active" id="fa-all" onclick="setFA('all')">전체</button>
        <button class="ftab" id="fa-59" onclick="setFA('59')">59㎡</button>
        <button class="ftab" id="fa-84" onclick="setFA('84')">84㎡</button>
      </div>
      <div id="budget-info" style="margin-top:7px;background:rgba(91,196,240,.08);border:1px solid rgba(91,196,240,.25);border-radius:7px;padding:7px 10px;line-height:1.6">
        <span style="color:var(--muted);font-size:10px">매수 가능 상한 (자가매도 + 주담보 2억)</span><br>
        <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--b)">재무 계산 중...</span>
      </div>
    </div>
    <div id="apt-list"><div class="load-msg"><div class="spinner"></div>실거래가 조회 중...</div></div>
  </div>

  <!-- MAIN -->

  <div id="main">
    <div id="map"></div>
    <div id="finance-panel"></div>
  </div>
</div>

<!-- 모바일 탭바 -->

<div id="mobile-tabbar">
  <button class="m-tab active" id="m-btn-map" onclick="switchTab('map')"><span class="mi">🗺️</span>지도</button>
  <button class="m-tab" id="m-btn-finance" onclick="switchTab('finance')"><span class="mi">💰</span>재무</button>
</div>

<!-- 모바일 바텀시트 -->

<div id="bottomsheet" class="collapsed">
  <div class="bs-handle" onclick="toggleBS()"></div>
  <div class="bs-content">
    <div style="padding-bottom:10px">
      <h3 style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--muted);margin-bottom:8px">📍 거점 반경</h3>
      <div class="radius-row">
        <label><span class="dot" style="background:var(--a)"></span>압구정 영유 (A)</label>
        <input type="range" id="rA2" min="1" max="15" step="0.5" value="4" oninput="updateRadius('A',this.value)">
        <span class="radius-val" id="rvA2">4.0km</span>
      </div>
      <div class="radius-row">
        <label><span class="dot" style="background:var(--b)"></span>원베일리 (B)</label>
        <input type="range" id="rB2" min="1" max="15" step="0.5" value="5" oninput="updateRadius('B',this.value)">
        <span class="radius-val" id="rvB2">5.0km</span>
      </div>

function recentMonths(n){
  const r=[];const d=new Date();
  for(let i=0;i<n;i++){
    r.push(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}`);
    d.setMonth(d.getMonth()-1);
  }
  return r;
}

const PROXY = 'https://corsproxy.io/?';

async function proxyFetch(url){
  // 1차: 직접 시도
  try{
    const r = await fetch(url);
    if(r.ok){ const t=await r.text(); if(t&&t.includes('<item>')) return t; }
  }catch{}
  // 2차: allorigins 프록시
  const r2 = await fetch(PROXY + encodeURIComponent(url));
  if(!r2.ok) throw new Error('proxy fail');
  return r2.text();
}

  }

  for(let i=0;i<reqs.length;i+=CHUNK){
    const batch=reqs.slice(i,i+CHUNK);
    const res=await Promise.allSettled(batch.map(r=>
      proxyFetch(r.url).then(xml=>({xml,type:r.type,lawd:r.lawd}))
        .catch(()=>({xml:'',type:r.type,lawd:r.lawd}))
    ));
    for(const r of res){
      if(r.status==='fulfilled' && r.value.xml){
        const parsed = parseXML(r.value.xml, r.value.type, r.value.lawd);

      }

    done += batch.length;

  renderList();
}

function parseXML(xmlStr,type,lawd){
  const doc=new DOMParser().parseFromString(xmlStr,'text/xml');
  const items=doc.querySelectorAll('item');
  const out=[];
  items.forEach(it=>{
    const g=s=>it.querySelector(s)?.textContent?.trim()||'';
    const name=g('aptNm')||g('아파트');
    const dong=g('umdNm')||g('법정동');
    const area=parseFloat(g('excluUseAr')||g('전용면적')||'0');
    const yr=g('dealYear')||g('년');const mo=g('dealMonth')||g('월');const dy=g('dealDay')||g('일');
    const date=`${yr}-${String(mo).padStart(2,'0')}-${String(dy).padStart(2,'0')}`;
    if(type==='buy'){
      const price=parseInt((g('dealAmount')||g('거래금액')||'').replace(/,/g,''))||0;
      if(name&&price>0) out.push({name,dong,price,area,date,type:'buy',lawd});
    } else {
      const price=parseInt((g('deposit')||g('보증금액')||'').replace(/,/g,''))||0;
      if(name&&price>0) out.push({name,dong,price,area,date,type:'rent',lawd});
    }
  });
  return out;
}

function groupApts(raw){
  const m={};
  raw.forEach(d=>{
    const k=`${d.name}|${d.dong}|${d.type}`;
    if(!m[k]) m[k]={name:d.name,dong:d.dong,type:d.type,lawd:d.lawd,deals:[]};
    m[k].deals.push({price:d.price,date:d.date,area:d.area});
  });
  return Object.values(m).map(g=>{
    g.deals.sort((a,b)=>b.date.localeCompare(a.date));
    const r3=g.deals.slice(0,3);
    g.avgPrice=Math.round(r3.reduce((s,d)=>s+d.price,0)/r3.length);
    g.latestDate=r3[0]?.date||'';
    g.latestArea=r3[0]?.area||0;
    return g;
  }).sort((a,b)=>b.avgPrice-a.avgPrice);
}

//  FINANCE ENGINE
// ══════════════════════════════════════════════════════════
function calcTax(baseWon){
  // 누진세율 적용 (원 단위 입력 → 원 단위 반환)
  const brackets=[
    [14000000,.06,0],[50000000,.15,1260000],[88000000,.24,5760000],
    [150000000,.35,15440000],[300000000,.38,19940000],[500000000,.40,25940000],
    [1000000000,.42,35940000],[Infinity,.45,65940000]
  ];
  if(baseWon<=0)return 0;
  for(const[lim,r,d] of brackets){if(baseWon<=lim)return Math.max(0,Math.round(baseWon*r-d));}
  return 0;
}

function calcAcqTax(priceMan){
  // 1주택 취득세
  const p=priceMan*10000;
  if(p<=600000000) return Math.round(priceMan*0.01);
  if(p<=900000000){
    const r=((p-600000000)/(300000000))*0.02+0.01;
    return Math.round(priceMan*r);
  }
  return Math.round(priceMan*0.03);
}

function holdYears(){
  try{
    const [y,m]=fin.buyDate.split('-').map(Number);
    const d=(new Date()-new Date(y,m-1,1))/(1000*60*60*24*365);
    return Math.max(0,d);
  }catch{return 0;}
}

function calcFinance(){
  const s=fin.sellPrice, b=fin.buyPrice;
  const gain=s-b; // 양도차익(만원)
  const hy=holdYears();
  const hyFloor=Math.floor(hy);
  const hhm=Math.round((hy-hyFloor)*12);
  const holdStr=`${hyFloor}년 ${hhm}개월`;

  // 장기보유특별공제 (보유 4%/년 + 거주 4%/년, 최대 80%)
  const holdPct=Math.min(hyFloor*4+hyFloor*4,80)/100;

  // 12억 초과 과세비율
  const taxableRatio = s>120000 ? (s-120000)/s : 0;
  const gainForTax1 = gain*taxableRatio*0.5; // 1인분 (만원)
  const taxBase1Man = gainForTax1*(1-holdPct); // 과세표준
  const tax1Won=calcTax(taxBase1Man*10000); // 원
  const tax1Man=Math.round(tax1Won/10000);
  const taxJointMan=tax1Man*2;
  const taxJointLocalMan=Math.round(taxJointMan*0.1);
  const taxJointTotal=taxJointMan+taxJointLocalMan;

  // 단독명의 비교
  const gainForTaxS=gain*taxableRatio;
  const taxBaseS=gainForTaxS*(1-holdPct);
  const taxSingleWon=calcTax(taxBaseS*10000);
  const taxSingleMan=Math.round(taxSingleWon/10000);
  const taxSingleLocal=Math.round(taxSingleMan*0.1);
  const taxSingleTotal=taxSingleMan+taxSingleLocal;
  const taxSave=taxSingleTotal-taxJointTotal;

  // 부채
  const debtMortgage=fin.mortgage;
  const debtTotal=fin.mortgage+fin.tesla+fin.minus1+fin.minus2;
  // (테슬라, 마통은 매도 정산에 포함 여부는 시나리오별 – 여기선 정산에서 제외, 가용 자금에서 차감)
  // 매도 정산: 주담대만 상환
  const agentFee=Math.round(s*0.004);

function syncInputs(){
  const map2={
    'f-sellPrice':'sellPrice','f-buyPrice':'buyPrice','f-buyDate':'buyDate',
    'f-mortgage':'mortgage','f-tesla':'tesla','f-minus1':'minus1','f-minus2':'minus2',
    'f-taxAgent':'taxAgent','f-regFee':'regFee','f-moveFee':'moveFee','f-etc1':'etc1',
    'f-jeonseRepair':'jeonseRepair','f-jeonseEtc':'jeonseEtc',
    'f-newRepair':'newRepair','f-newRegFee':'newRegFee','f-newEtc':'newEtc',
    'xrp-qty':'xrpQty','btc-qty':'btcQty',
  };
  Object.entries(map2).forEach(([id,k])=>{

function finInput(k,v){
  if(k==='buyDate') fin[k]=v; else fin[k]=parseFloat(v)||0;
  lss('fin_'+k, fin[k]);
  calcFinance();
}

// 크립토 시세
async function fetchCrypto(){
  try{
    const[xr,bt]=await Promise.all([
      fetch('https://api.coingecko.com/api/v3/simple/price?ids=ripple&vs_currencies=krw').then(r=>r.json()),
      fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=krw').then(r=>r.json())
    ]);
    fin.xrpPrice=xr.ripple?.krw||2074;
    fin.btcPrice=bt.bitcoin?.krw||113388000;
    const now=new Date();
    const ts=`${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    set('crypto-ts','시세 기준: '+ts);
    set('xrp-unit-p','₩'+new Intl.NumberFormat('ko').format(Math.round(fin.xrpPrice)));
    set('btc-unit-p','₩'+new Intl.NumberFormat('ko').format(Math.round(fin.btcPrice/10000))+'만');
  }catch{
    set('crypto-ts','시세 조회 실패 — 기본값 사용');
  }
  calcFinance();
}

function pad(n){return String(n).padStart(2,'0');}
function fmt(v){return new Intl.NumberFormat('ko').format(Math.round(v||0));}
function fmtBig(v){
  const abs=Math.abs(Math.round(v||0));
  const sign=v<0?'-':'';
  if(abs>=10000){const uk=Math.floor(abs/10000);const rem=abs%10000;
    return sign+(rem>0?`${uk}억 ${fmt(rem)}만원`:`${uk}억원`);
  }
  return sign+fmt(abs)+'만원';
}
function set(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function color(id,c){const el=document.getElementById(id);if(el)el.style.color=c;}

function switchTab(tab){
  currentTab=tab;
  const mob=window.innerWidth<=768;
  document.getElementById('btn-map')?.classList.toggle('active',tab==='map');
  document.getElementById('btn-finance')?.classList.toggle('active',tab==='finance');
  document.getElementById('m-btn-map')?.classList.toggle('active',tab==='map');
  document.getElementById('m-btn-finance')?.classList.toggle('active',tab==='finance');
  if(tab==='map'){
    if(!mob) document.getElementById('sidebar').style.display='';
    else { document.getElementById('sidebar').style.display='none';document.getElementById('bottomsheet').style.display=''; }
    document.getElementById('map').style.display='';
    document.getElementById('finance-panel').style.display='none';
    document.getElementById('disclaimer').style.display='none';
    setTimeout(()=>map?.invalidateSize(),120);
  } else {
    document.getElementById('sidebar').style.display='none';
    document.getElementById('map').style.display='none';
    document.getElementById('finance-panel').style.display='block';
    document.getElementById('disclaimer').style.display='block';
    if(mob) document.getElementById('bottomsheet').style.display='none';
    calcFinance();
  }
}

function toggleBS(){

}

// ── 바텀시트 스와이프 ──
(function(){
  const bs = ()=>document.getElementById('bottomsheet');
  let startY=0, startT=0, isDragging=false;

  function onStart(e){
    const t = e.touches?.[0]||e;
    startY = t.clientY;
    startT = Date.now();
    isDragging = true;
    const el=bs();
    el.style.transition='none';
  }
  function onMove(e){
    if(!isDragging) return;
    const t = e.touches?.[0]||e;
    const dy = t.clientY - startY;
    const el=bs();
    const collapsed = el.classList.contains('collapsed');
    // 접힌 상태: 위로만 / 펼친 상태: 아래로만
    if(collapsed && dy<0){
      el.style.transform=`translateY(calc(100% - 76px + ${dy}px))`;
    } else if(!collapsed && dy>0){
      el.style.transform=`translateY(${dy}px)`;
    }
  }
  function onEnd(e){
    if(!isDragging) return;
    isDragging=false;
    const t = e.changedTouches?.[0]||e;
    const dy = t.clientY - startY;
    const dt = Date.now() - startT;
    const el=bs();
    el.style.transition='';
    el.style.transform='';
    // 빠른 스와이프(플릭) 또는 50px 이상 이동
    const flick = dt < 250;
    const collapsed = el.classList.contains('collapsed');
    if(collapsed && (dy < -50 || (flick && dy < -20))){
      bsExpanded=true; el.classList.remove('collapsed');
    } else if(!collapsed && (dy > 50 || (flick && dy > 20))){
      bsExpanded=false; el.classList.add('collapsed');
    } else {
      // 원위치
      el.style.transform='';
    }
  }

  document.addEventListener('DOMContentLoaded',()=>{
    const el=bs();
    if(!el) return;
    el.addEventListener('touchstart', onStart, {passive:true});
    el.addEventListener('touchmove',  onMove,  {passive:true});
    el.addEventListener('touchend',   onEnd);
  });
})();
